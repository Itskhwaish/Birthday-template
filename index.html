<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Surprise</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 80%;
      max-width: 400px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
    }

    #main {
      display: none;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div id="login" class="box">
  <h2>🎁 Enter Passcode</h2>
  <input type="password" id="code" placeholder="Enter code">
  <br>
  <button onclick="checkCode()">Unlock</button>
</div>

<div id="main" class="box">
  <h2>🎉 Happy Birthday!</h2>
  <p>Welcome to your surprise 💖</p>

  <a class="btn" href="#">💌 Letter</a>
  <a class="btn" href="#">📸 Memories</a>
  <a class="btn" href="#">🎵 Song</a>
  <a class="btn" href="#">🎥 Video</a>
  <a class="btn" href="#">🎁 Final Surprise</a>
</div>

<script>
  function checkCode() {
    let code = document.getElementById("code").value;
    if (code === "2115") {
      document.getElementById("login").style.display = "none";
      document.getElementById("main").style.display = "block";
    } else {
      alert("Wrong code 😢 Try again");
    }
  }
</script>

</body>
</html>
